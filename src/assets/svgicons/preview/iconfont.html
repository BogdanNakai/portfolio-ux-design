<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>iconfont</title>
	<style>
		body{
			padding: 1.875rem;
			font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
			font-size: 1em;
			background-color:#333;
			color:#fff;
		}
		h1{
			font-size: 1.875rem;
			margin-bottom: 2rem;
		}
		ul{
			display: flex;
			flex-wrap: wrap;
			gap: 2.5rem;
			margin: 0;
			padding: 0;
		}
		ul li{
			margin-bottom: 0.625rem;
			display: inline-flex;
			gap: 0.625rem;
			list-style: none;
			align-items: center;
		}
		ul li::before{
			font-size: 2rem;
		}
		@font-face { 
	font-family: "iconfont"; 
	font-display: swap;
	src: url("C://Users/User/Desktop/flsStart4-23-04-2025_07-49/src/assets/svgicons/preview/iconfont.woff2?28024133ce9df55e9dd5b080deda19a5") format("woff2"); 
} 
[class*="--icon-"]::before{
	font-family: iconfont; 
}
	[class*="--icon-phone"]::before { 
		content: "\f101"; 
	} 
	[class*="--icon-mail"]::before { 
		content: "\f102"; 
	} 
	[class*="--icon-inst"]::before { 
		content: "\f103"; 
	} 
	[class*="--icon-in"]::before { 
		content: "\f104"; 
	} 
	[class*="--icon-dribbble"]::before { 
		content: "\f105"; 
	} 
	[class*="--icon-download"]::before { 
		content: "\f106"; 
	} 
	[class*="--icon-behance"]::before { 
		content: "\f107"; 
	} 

	</style>
</head>
<body>
	<h1>Перелік іконок та їх класів:</h1>
	<ul>
			<li class="--icon-phone">--icon-phone</li>
			<li class="--icon-mail">--icon-mail</li>
			<li class="--icon-inst">--icon-inst</li>
			<li class="--icon-in">--icon-in</li>
			<li class="--icon-dribbble">--icon-dribbble</li>
			<li class="--icon-download">--icon-download</li>
			<li class="--icon-behance">--icon-behance</li>
	</ul>
</body>
</html>
