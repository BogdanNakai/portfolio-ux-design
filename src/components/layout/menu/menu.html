<div class="header__menu menu">
	<button type="button" data-fls-menu class="menu__icon icon-menu"><span></span></button>
	<nav class="menu__body">
		<ul class="menu__list">
			<each loop='item in [
					{"href": "","ancor": "Home" ,"idHesh": "home"},
					{"href": "","ancor": "Services","idHesh": "services"},
					{"href": "","ancor": "About me","idHesh": "about-me"},
					{"href": "","ancor": "Portfolio","idHesh": "portfolio"},
					{"href": "","ancor": "Contact me","idHesh": "contact-me"}
				]'>
				<if condition="'[[active]]' === '[[item.ancor]]'">
					<li class="menu__item">
						<a data-fls-scrollto-header data-fls-scrollto-top="30" data-fls-scrollto="#[[item.idHesh]]" href="[[item.href]]" class="menu__link">[[item.ancor]]</a>
					</li>
				</if>
				<else>
					<li class="menu__item">
						<a data-fls-scrollto-header data-fls-scrollto-top="30" data-fls-scrollto="#[[item.idHesh]]" href="[[item.href]]" class="menu__link">[[item.ancor]]</a>
					</li>
				</else>
			</each>
		</ul>
	</nav>
</div>
